<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Droptools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: white;
    }
    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }
    label {
      display: block;
      text-align: left;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    input[type="email"] {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="email"]:focus { border-color: #555; }
    button {
      width: 100%;
      padding: 12px;
      background: white;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
      color: #ff6b6b;
    }
    .msg.success { color: #51cf66; }
    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #555;
    }
    .footer a { color: #888; text-decoration: underline; }
    .footer a:hover { color: white; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Droptools</div>
    <div class="subtitle">Inicia sessão com o teu email de subscrição</div>

    <label>Email</label>
    <input type="email" id="email" placeholder="exemplo@email.com" />
    <button id="btn" onclick="verificar()">Entrar</button>
    <div class="msg" id="msg"></div>

    <div class="footer">
      Sem subscrição? <a href="https://www.drop-tools.com" target="_blank">Subscreve aqui</a>
    </div>
  </div>

  <script>
    async function doLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const btn   = document.getElementById("loginBtn");
  const err   = document.getElementById("loginError");
  if (!email) { showErr("Introduz o teu email."); return; }
  btn.textContent = "A verificar...";
  btn.disabled = true;
  err.style.display = "none";

  try {
    const res  = await fetch("/.netlify/functions/check-subscription", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.active) {
      localStorage.setItem("dt_email", email);
      showDashboard(email);
    } else {
      showErr("Sem subscrição ativa. Subscreve em drop-tools.com");
    }
  } catch {
    showErr("Erro de ligação. Tenta novamente.");
  }
  btn.textContent = "Entrar";
  btn.disabled = false;
}
